<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>2473033 - Kristian David</title>

<style>
body {
    font-family: Arial;
}

.container {
    width: 350px;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.desc-box {
    position: relative;
}

textarea {
    width: 100%;
    height: 120px;
    resize: none;
    box-sizing: border-box;
}

.counter {
    position: absolute;
    right: 5px;
    bottom: -18px; 
    font-size: 12px;
    color: black;
    background: #f5f5f5;
    padding: 2px 6px;
    border: 1px solid #ccc;
}
</style>

</head>
<body>

<div class="container">
    <label>Judul :</label><br>
    <input type="text" style="width:100%;"><br><br>

    <label>Deskripsi :</label><br>

    <div class="desc-box">
        <textarea id="deskripsi" maxlength="256"
            onkeyup="onKeyPress(this)"
            onkeydown="onKeyPress(this)"></textarea>

        <div id="txt2" class="counter">0/256</div>
    </div>
</div>

<script>
function onKeyPress(ob) {
    let val = ob.value;

    if (val.length > 256) {
        ob.value = val.substring(0, 256);
    }

    document.getElementById("txt2").innerText = ob.value.length + "/256";
}
</script>

</body>
</html>
