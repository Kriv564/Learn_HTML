<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Array JS</title>

<style>
body {
    font-family: Arial;
}

.box {
    width: 300px;
    padding: 15px;
    border: 2px solid #ccc;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

input, select, button {
    margin: 5px 0;
}
</style>

</head>
<body>

<div class="box">
    <label>Data</label>
    <input type="number" id="data"><br>

    <button onclick="tambahData()">Add</button>

    <select onchange="proses(this.value)">
        <option value="">Pilih Operasi</option>
        <option value="display">Display</option>
        <option value="count">Count</option>
        <option value="sum">Sum</option>
        <option value="avg">Average</option>
        <option value="max">Max</option>
        <option value="min">Min</option>
        <option value="ganjil">Ganjil</option>
        <option value="genap">Genap</option>
        <option value="hapus">Hapus</option>
    </select>

    <br><br>

    <label>Hasil</label>
    <input type="text" id="hasil" readonly style="width:100%;">
</div>

<script>
let arr = [];

function tambahData() {
    let input = document.getElementById("data");
    let value = parseInt(input.value);

    if (!isNaN(value)) {
        arr.push(value);
        input.value = ""; // kosongkan input
    }
}

function proses(pilihan) {
    let hasil = document.getElementById("hasil");

    switch(pilihan) {
        case "display":
            hasil.value = arr.join(", ");
            break;

        case "count":
            hasil.value = arr.length;
            break;

        case "sum":
            let sum = arr.reduce((a, b) => a + b, 0);
            hasil.value = sum;
            break;

        case "avg":
            let avg = arr.reduce((a, b) => a + b, 0) / arr.length;
            hasil.value = arr.length ? avg : 0;
            break;

        case "max":
            hasil.value = Math.max(...arr);
            break;

        case "min":
            hasil.value = Math.min(...arr);
            break;

        case "ganjil":
            hasil.value = arr.filter(x => x % 2 !== 0).join(", ");
            break;

        case "genap":
            hasil.value = arr.filter(x => x % 2 === 0).join(", ");
            break;

        case "hapus":
            arr = [];
            hasil.value = "Array dikosongkan";
            break;
    }
}
</script>

</body>
</html>
