<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kristian David-2473033</title>
    <style>
        body {
            font-family: Arial;
        }
        .box {
            width: 250px;
            padding: 10px;
            border: 1px solid #999;
            background: #eee;
        }
        input {
            margin: 5px 0;
            width: 100px;
        }
        button {
            margin: 5px 0;
        }
        table {
            margin-top: 10px;
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            width: 40px;
            height: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <label>Angka Pertama :</label><br>
    <input type="text" id="angka1"><br>

    <label>Angka Kedua :</label><br>
    <input type="text" id="angka2"><br>

    <button onclick="hitung()">Count</button>

    <table>
        <tr>
            <td id="a1"></td>
            <td>+</td>
            <td id="a2"></td>
            <td>=</td>
            <td id="hasilTambah"></td>
        </tr>
        <tr>
            <td id="b1"></td>
            <td>-</td>
            <td id="b2"></td>
            <td>=</td>
            <td id="hasilKurang"></td>
        </tr>
    </table>
</div>

<script>
function hitung() {
    let x = document.getElementById("angka1").value;
    let y = document.getElementById("angka2").value;

    let a = parseInt(x);
    let b = parseInt(y);

    if (isNaN(a) && isNaN(b)) {
        alert("angka pertama dan kedua harus angka");
        return;
    } else if (isNaN(a)) {
        alert("angka pertama bukan angka");
        return;
    } else if (isNaN(b)) {
        alert("angka kedua harus angka");
        return;
    }

    document.getElementById("a1").innerHTML = a;
    document.getElementById("a2").innerHTML = b;
    document.getElementById("b1").innerHTML = a;
    document.getElementById("b2").innerHTML = b;

    document.getElementById("hasilTambah").innerHTML = a + b;
    document.getElementById("hasilKurang").innerHTML = a - b;
}
</script>

</body>
</html>
