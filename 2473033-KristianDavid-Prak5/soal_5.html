<!DOCTYPE html>
<html>
<head>
    <title>KristianDavid-2473033</title>
    <style>
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        ul.navbar > li {
            display: inline-block;
            position: relative;
            margin-right: 3px; 
        }

        ul.navbar li a {
            display: block;
            padding: 10px 20px;
            text-decoration: none;
            color: black;

            border-style: dotted;
            border-color: grey;
            border-width: 2px;
        }

        ul.navbar li a:hover {
            background-color: black;
            color: white;
        }

        ul.submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
        }

        ul.submenu li {
            display: block;
            margin-top: 3px;
        }

        li.dropdown:hover ul.submenu {
            display: block;
        }
    </style>
</head>
<body>

    <ul class="navbar">
        <li><a href="#">Home</a></li>

        <li class="dropdown">
            <a href="#">News</a>
            <ul class="submenu">
                <li><a href="#">Sports</a></li>
                <li><a href="#">Music</a></li>
                <li><a href="#">Movie</a></li>
            </ul>
        </li>

        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
    </ul>

</body>
</html>
